version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cinema_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_local_pass
      POSTGRES_DB: online_cinema_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cinema_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
